<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Jiachen Zhao" />
    <title>ReadQueue</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/cards.css" />
    <link rel="stylesheet" href="css/landing.css" />
  </head>
  <body>
    <header class="site-header">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <rect
            x="0.5"
            y="0.5"
            width="39"
            height="39"
            fill="blue"
            stroke="currentColor"
          />
        </svg>
      </span>
      <span class="wordmark">ReadQueue</span>
    </header>

    <main class="layout" id="layout">
      <section class="content">
        <div class="list-header">
          <h1>List title</h1>
          <p class="subtitle">List description</p>
        </div>

        <div class="toolbar-top">
          <nav class="tabs">
            <button class="tab is-active" data-tab="papers">Papers</button>
            <button class="tab" data-tab="books">Books</button>
          </nav>
          <button class="btn btn-add" id="add-item">+ Add Item</button>
        </div>

        <div class="toolbar-filters">
          <div class="search">
            <span class="search-icon" aria-hidden="true">&#128269;</span>
            <input type="search" id="search" placeholder="Search..." />
          </div>
          <div class="filters">
            <button class="filter is-active" data-status="all">All</button>
            <button class="filter" data-status="to-read">To-Read</button>
            <button class="filter" data-status="reading">Reading</button>
            <button class="filter" data-status="done">Done</button>
          </div>
        </div>

        <!-- Cards are rendered by landing.js -->
        <ul class="item-list" data-panel="papers"></ul>
        <ul class="item-list" data-panel="books" hidden></ul>
      </section>

      <aside class="comments" id="comments" hidden>
        <button
          type="button"
          class="comments-close"
          id="comments-close"
          aria-label="Close comments"
        >
          &times;
        </button>
        <h2 class="comments-title">Comments</h2>
        <p class="comments-for">
          For: <a href="#" id="comments-for">selected item</a>
        </p>

        <!-- Comments are rendered by landing.js -->
        <ul class="comment-list"></ul>

        <form class="comment-form">
          <input type="text" class="comment-name" placeholder="Your name" />
          <textarea rows="4" placeholder="Write a comment..."></textarea>
          <button type="submit" class="btn btn-post">Post Comment</button>
        </form>
      </aside>
    </main>

    <!-- Add / edit form (hidden until opened) -->
    <div class="form-backdrop" id="item-form-backdrop" hidden>
      <form class="item-form" id="item-form">
        <h2 id="item-form-title">Add item</h2>
        <label>Title <input name="title" required /></label>
        <label>Authors <input name="authors" /></label>
        <label>Venue <input name="venue" /></label>
        <label>Year <input name="year" type="number" /></label>
        <label>Tags (comma separated) <input name="tags" /></label>
        <label>
          Status
          <select name="status">
            <option value="to-read">To-Read</option>
            <option value="reading">Reading</option>
            <option value="done">Done</option>
          </select>
        </label>
        <div class="item-form-actions">
          <button type="button" class="btn" id="item-form-cancel">
            Cancel
          </button>
          <button type="submit" class="btn btn-add">Save</button>
        </div>
      </form>
    </div>

    <script src="js/landing.js"></script>
  </body>
</html>
