<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Jiachen Zhao" />
    <title>ReadQueue</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/cards.css" />
    <link rel="stylesheet" href="css/landing.css" />
  </head>
  <body>
    <header class="site-header">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <rect x="0.5" y="0.5" width="39" height="39" fill="blue" stroke="currentColor" />
        </svg>
      </span>
      <span class="wordmark">ReadQueue</span>
    </header>

    <main class="layout" id="layout">
      <section class="content">
        <div class="list-header">
          <h1>List title</h1>
          <p class="subtitle">List description</p>
        </div>

        <div class="toolbar-top">
          <nav class="tabs">
            <button class="tab is-active" data-tab="papers">Papers</button>
            <button class="tab" data-tab="books">Books</button>
          </nav>
          <button class="btn btn-add">+ Add Item</button>
        </div>

        <div class="toolbar-filters">
          <div class="search">
            <span class="search-icon" aria-hidden="true">&#128269;</span>
            <input type="search" placeholder="Search..." />
          </div>
          <div class="filters">
            <button class="filter is-active">All</button>
            <button class="filter">To-Read</button>
            <button class="filter">Reading</button>
            <button class="filter">Done</button>
          </div>
        </div>

        <ul class="item-list" data-panel="papers">
          <li class="item-card" data-type="paper" data-id="">
            <span class="item-num">1</span>
            <div class="item-body">
              <div class="item-main">
                <h3 class="item-title">Paper title</h3>
                <p class="item-authors">Author</p>
                <p class="item-venue">Venue · Year</p>
                <div class="tags">
                  <span class="tag">tag</span>
                </div>
              </div>
              <div class="item-side">
                <button class="status">To-Read</button>
                <div class="item-actions">
                  <button class="action action-edit">&#9998; Edit</button>
                  <button class="action action-delete">&#128465; Delete</button>
                </div>
              </div>
            </div>
          </li>
        </ul>

        <ul class="item-list" data-panel="books" hidden>
          <li class="item-card" data-type="book" data-id="">
            <span class="item-num">1</span>
            <div class="item-body">
              <div class="item-main">
                <h3 class="item-title">Book title</h3>
                <p class="item-authors">Author</p>
                <p class="item-venue">Publisher · Year</p>
                <div class="tags">
                  <span class="tag">tag</span>
                </div>
              </div>
              <div class="item-side">
                <button class="status">To-Read</button>
                <div class="item-actions">
                  <button class="action action-edit">&#9998; Edit</button>
                  <button class="action action-delete">&#128465; Delete</button>
                </div>
              </div>
            </div>
          </li>
        </ul>
      </section>

      <aside class="comments" id="comments" hidden>
        <button type="button" class="comments-close" id="comments-close" aria-label="Close comments">&times;</button>
        <h2 class="comments-title">Comments</h2>
        <p class="comments-for">For: <a href="#" id="comments-for">selected item</a></p>

        <ul class="comment-list">
          <li class="comment">
            <div class="comment-head">
              <span class="comment-author">Author</span>
              <span class="comment-date">Date</span>
            </div>
            <p class="comment-text">Comment text</p>
          </li>
        </ul>

        <form class="comment-form">
          <input type="text" class="comment-name" placeholder="Your name" />
          <textarea rows="4" placeholder="Write a comment..."></textarea>
          <button type="submit" class="btn btn-post">Post Comment</button>
        </form>
      </aside>
    </main>

    <script src="js/landing.js"></script>
  </body>
</html>
